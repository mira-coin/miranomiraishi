<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>囚われた電脳の迷宮</title><style>*{box-sizing:border-box}html,body{margin:0;height:100%;overflow:hidden;background:#020611;color:#e9fbff;font-family:system-ui,-apple-system,"Segoe UI",sans-serif}canvas{display:block}button,select,input{font:inherit}.hud{position:fixed;z-index:5;background:rgba(2,10,25,.82);border:1px solid #2ed9ff;border-radius:10px;box-shadow:0 0 22px #0af4;padding:12px;backdrop-filter:blur(8px)}#top{top:12px;left:12px;max-width:min(480px,62vw)}#mira{right:12px;top:12px;width:min(360px,34vw)}#mira h3{margin:0;color:#8eeeff}#miraFace{font-size:42px;float:left;margin-right:10px}.small{font-size:12px;opacity:.8}#bottom{left:12px;right:12px;bottom:12px;display:flex;gap:10px;align-items:center;justify-content:space-between}.btn{border:1px solid #39dfff;background:#09233b;color:white;padding:10px 14px;border-radius:8px;cursor:pointer}.btn:hover{background:#12496f}.danger{border-color:#ff547a}.accent{background:#0d5f80}.pill{padding:6px 10px;border:1px solid #3983aa;border-radius:999px}.hidden{display:none!important}#overlay{position:fixed;inset:0;z-index:20;background:radial-gradient(circle at 50% 35%,#123f70 0,#030712 55%,#000 100%);display:flex;align-items:center;justify-content:center;padding:20px}.panel{width:min(860px,95vw);padding:28px;border:1px solid #45e1ff;border-radius:18px;background:rgba(3,10,25,.92);box-shadow:0 0 50px #0cf5;text-align:center}.title{font-size:clamp(28px,5vw,62px);margin:0 0 8px;text-shadow:0 0 20px #7df}.sub{opacity:.85;margin-bottom:24px}.langs{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:18px}.lang{min-width:160px}.controls{font-size:13px;line-height:1.8;opacity:.9}#modal{position:fixed;inset:0;z-index:15;background:rgba(0,0,0,.72);display:flex;align-items:center;justify-content:center;padding:18px}#modal .panel{text-align:left;max-width:650px}.choice{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:12px 0}.choice button{padding:14px}.seq{font-size:28px;letter-spacing:8px;padding:14px;background:#020b18;border:1px solid #277}.toast{position:fixed;left:50%;top:18%;transform:translateX(-50%);z-index:30;background:#061426dd;border:1px solid #5ef;padding:12px 18px;border-radius:9px}.reticle{position:fixed;left:50%;top:50%;width:14px;height:14px;margin:-7px;border:2px solid #bdf;border-radius:50%;z-index:4;pointer-events:none}@media(max-width:800px){#mira{top:auto;bottom:86px;width:calc(100% - 24px)}#top{max-width:calc(100% - 24px)}#bottom{flex-wrap:wrap}#bottom .small{width:100%}}</style></head><body><div id="overlay"><div class="panel"><h1 class="title">囚われた電脳の迷宮</h1><div class="sub">ミラの未来視 外伝・脱出ゲーム</div><p id="selectLabel">言語を選んでください</p><div class="langs"><button class="btn lang" data-lang="ja">日本語</button><button class="btn lang" data-lang="en">English</button><button class="btn lang" data-lang="id">Bahasa Indonesia</button></div><button id="start" class="btn accent">START</button><div class="controls">WASD / 矢印キー：移動　マウス：視点　E：調査　Q：未来視　H：ヒント</div></div></div><div id="top" class="hud"><b id="objective"></b><div id="room"></div><div class="small" id="inventory"></div></div><div id="mira" class="hud"><div id="miraFace">◉</div><h3>ミラ / Mira</h3><div id="miraText"></div><div class="small" id="futureState"></div></div><div id="bottom" class="hud"><div><button id="interact" class="btn">E 調査</button><button id="future" class="btn">Q 未来視</button><button id="hint" class="btn">H ヒント</button></div><div class="small" id="controlsText"></div><select id="langSelect"><option value="ja">日本語</option><option value="en">English</option><option value="id">Bahasa Indonesia</option></select></div><div class="reticle"></div><div id="modal" class="hidden"><div class="panel"><h2 id="modalTitle"></h2><div id="modalBody"></div><button id="modalClose" class="btn">閉じる</button></div></div><div id="toast" class="toast hidden"></div><script src="https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.min.js"></script><script>
const T={ja:{obj:'3つの部屋を突破して電脳迷宮から脱出する',room:'現在の部屋',inv:'所持品',none:'なし',r1:'観測の間',r2:'無音の暗証室',r3:'未来残像の間',m0:'ヨウ、ここは普通の出口ではありません。普通だったらゲームが始まりません。',m1:'壁の記号は、見る方法で変化します。赤いフィルターと監視端末を探してください。',m2:'音は消されています。でも間隔までは消せません。点滅の順番と組み合わせましょう。',m3:'未来は三つに分岐しています。行動しても変化しない足場だけが安全です。',clear:'脱出成功！ ミラとヨウは未来を選び直した。',hint:'ヒント',h1:'机の上の赤いフィルターを取り、監視端末を調べる。3種類の並びから共通する移動規則を探す。',h2:'音の長さは数字、ランプの点滅は並べる順番。',h3:'未来視中に色が変わらない床だけを順番に選ぶ。',got:'入手：赤いフィルター',cam:'肉眼「△○□×」 フィルター「○□×△」 カメラ「□×△○」',enter:'4桁コードを入力',wrong:'違う。警報だけ元気です。',right:'解除成功。次の部屋が開いた。',sound:'無音ログ：短・長・長・短 = 1・3・3・1　ランプ順：2→4→1→3',future:'未来視：安定床は A → C → B',locked:'まだ解除条件を満たしていない。',interact:'E 調査',futureBtn:'Q 未来視',hintBtn:'H ヒント',controls:'WASD/矢印：移動　マウス：視点',cool:'未来視 準備完了',cooling:'未来視 再演算中',close:'閉じる'},en:{obj:'Escape the cyber labyrinth by clearing all three rooms',room:'Current room',inv:'Items',none:'None',r1:'Observation Chamber',r2:'Silent Cipher Room',r3:'Future Echo Chamber',m0:'You, this is not an ordinary exit. If it were, the game would already be over.',m1:'The wall symbols change depending on how they are observed. Find the red filter and surveillance terminal.',m2:'The sound is gone, but the intervals remain. Combine them with the flashing order.',m3:'The future splits into three. Only platforms unchanged by your actions are safe.',clear:'ESCAPE COMPLETE! Mira and You chose the future again.',hint:'Hint',h1:'Take the red filter from the desk and inspect the terminal. Compare the three symbol orders.',h2:'Sound length gives numbers; lamp flashes give the order.',h3:'During future sight, select only the tiles whose color stays unchanged.',got:'Obtained: Red Filter',cam:'Eyes “△○□×” Filter “○□×△” Camera “□×△○”',enter:'Enter a 4-digit code',wrong:'Wrong. At least the alarm is enthusiastic.',right:'Unlocked. The next room is open.',sound:'Silent log: short-long-long-short = 1-3-3-1; lamp order: 2→4→1→3',future:'Future sight: stable tiles are A → C → B',locked:'The condition is not met yet.',interact:'E Inspect',futureBtn:'Q Future Sight',hintBtn:'H Hint',controls:'WASD/Arrows: Move  Mouse: Look',cool:'Future Sight Ready',cooling:'Recalculating future',close:'Close'},id:{obj:'Keluar dari labirin siber dengan menaklukkan tiga ruangan',room:'Ruangan saat ini',inv:'Barang',none:'Tidak ada',r1:'Ruang Pengamatan',r2:'Ruang Sandi Sunyi',r3:'Ruang Jejak Masa Depan',m0:'You, ini bukan pintu keluar biasa. Kalau biasa, gamenya sudah selesai.',m1:'Simbol dinding berubah tergantung cara melihatnya. Cari filter merah dan terminal kamera.',m2:'Suaranya hilang, tapi jaraknya masih ada. Gabungkan dengan urutan lampu.',m3:'Masa depan bercabang tiga. Hanya pijakan yang tidak berubah yang aman.',clear:'BERHASIL KELUAR! Mira dan You memilih kembali masa depan.',hint:'Petunjuk',h1:'Ambil filter merah di meja lalu periksa terminal. Bandingkan tiga urutan simbol.',h2:'Panjang bunyi menjadi angka; kedipan lampu menentukan urutan.',h3:'Saat penglihatan masa depan aktif, pilih ubin yang warnanya tidak berubah.',got:'Diperoleh: Filter Merah',cam:'Mata “△○□×” Filter “○□×△” Kamera “□×△○”',enter:'Masukkan kode 4 angka',wrong:'Salah. Setidaknya alarmnya semangat.',right:'Terbuka. Ruangan berikutnya dibuka.',sound:'Log sunyi: pendek-panjang-panjang-pendek = 1-3-3-1; urutan lampu: 2→4→1→3',future:'Penglihatan masa depan: ubin stabil A → C → B',locked:'Syarat belum terpenuhi.',interact:'E Periksa',futureBtn:'Q Penglihatan',hintBtn:'H Petunjuk',controls:'WASD/Panah: Bergerak  Mouse: Melihat',cool:'Penglihatan Siap',cooling:'Menghitung ulang masa depan',close:'Tutup'}};
let lang='ja',state={room:0,filter:false,cam:false,p1:false,p2:false,p3:false,seq:[],future:false,started:false};const $=id=>document.getElementById(id);function tr(k){return T[lang][k]||k}function say(s){$('miraText').textContent=s}function toast(s){$('toast').textContent=s;$('toast').classList.remove('hidden');setTimeout(()=>$('toast').classList.add('hidden'),2200)}function update(){const names=[tr('r1'),tr('r2'),tr('r3')];$('objective').textContent=tr('obj');$('room').textContent=tr('room')+': '+names[state.room];$('inventory').textContent=tr('inv')+': '+(state.filter?'🔴 Filter':'—');$('interact').textContent=tr('interact');$('future').textContent=tr('futureBtn');$('hint').textContent=tr('hintBtn');$('controlsText').textContent=tr('controls');$('futureState').textContent=state.future?tr('cooling'):tr('cool');$('modalClose').textContent=tr('close')}function setLang(l){lang=l;$('langSelect').value=l;update();say([tr('m1'),tr('m2'),tr('m3')][state.room]||tr('m0'))}document.querySelectorAll('.lang').forEach(b=>b.onclick=()=>setLang(b.dataset.lang));$('langSelect').onchange=e=>setLang(e.target.value);$('start').onclick=()=>{$('overlay').classList.add('hidden');state.started=true;renderer.domElement.requestPointerLock?.();say(tr('m0'));setTimeout(()=>say(tr('m1')),1800)};
const scene=new THREE.Scene();scene.background=new THREE.Color(0x020611);scene.fog=new THREE.Fog(0x020611,12,72);const camera=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,.1,150);camera.position.set(0,1.7,8);const renderer=new THREE.WebGLRenderer({antialias:true});renderer.setSize(innerWidth,innerHeight);renderer.setPixelRatio(Math.min(devicePixelRatio,2));document.body.prepend(renderer.domElement);scene.add(new THREE.AmbientLight(0x274060,1.7));const light=new THREE.PointLight(0x22ccff,45,45);light.position.set(0,6,0);scene.add(light);const geo=new THREE.BoxGeometry(1,1,1),objects=[];function box(x,y,z,sx,sy,sz,c,tag){const m=new THREE.Mesh(geo,new THREE.MeshStandardMaterial({color:c,metalness:.65,roughness:.35,emissive:new THREE.Color(c).multiplyScalar(.13)}));m.position.set(x,y,z);m.scale.set(sx,sy,sz);m.userData.tag=tag||'';scene.add(m);if(tag)objects.push(m);return m}function room(cx,color){box(cx,-.5,0,12,1,16,0x071321);box(cx,4.5,-8,12,9,1,0x071321);box(cx,4.5,8,12,9,1,0x071321);box(cx-6,4,0,1,9,16,0x071321);box(cx+6,4,0,1,9,16,0x071321);for(let i=-4;i<=4;i+=2){box(cx+i,.05,-5,.7,.1,.7,color);box(cx+i,.05,5,.7,.1,.7,color)}}room(0,0x1177aa);room(28,0x7b2cff);room(56,0x16b88a);box(0,1,-3,2,2,.6,0x7a142a,'filter');box(3,1,0,1.5,2,.6,0x083c70,'camera');box(6,2,0,.3,4,3,0xff3355,'door1');box(28,1,0,2,2,.7,0x4d2377,'sound');box(34,2,0,.3,4,3,0xff3355,'door2');['A','B','C'].forEach((n,i)=>{const m=box(52+i*4,.15,0,2,.3,4,[0x2255aa,0xaa2255,0x22aa66][i],'tile'+n);m.userData.label=n});box(62,2,0,.3,4,3,0x44ffaa,'exit');
let yaw=0,pitch=0,keys={};addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=true;if(e.key.toLowerCase()==='e')interact();if(e.key.toLowerCase()==='q')future();if(e.key.toLowerCase()==='h')hint()});addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);addEventListener('mousemove',e=>{if(document.pointerLockElement===renderer.domElement){yaw-=e.movementX*.0023;pitch=Math.max(-1.2,Math.min(1.2,pitch-e.movementY*.0023));camera.rotation.set(pitch,yaw,0,'YXZ')}});renderer.domElement.onclick=()=>state.started&&renderer.domElement.requestPointerLock?.();$('interact').onclick=interact;$('future').onclick=future;$('hint').onclick=hint;$('modalClose').onclick=()=>$('modal').classList.add('hidden');function nearest(){let best=null,d=3;for(const o of objects){const x=o.position.distanceTo(camera.position);if(x<d){d=x;best=o}}return best}function openModal(title,html){$('modalTitle').textContent=title;$('modalBody').innerHTML=html;$('modal').classList.remove('hidden')}function codePuzzle(answer,onok){openModal(tr('enter'),'<input id="code" maxlength="4" inputmode="numeric" style="width:100%;padding:14px;font-size:28px"><br><br><button id="submitCode" class="btn accent">OK</button>');setTimeout(()=>$('submitCode').onclick=()=>{if($('code').value===answer){onok();$('modal').classList.add('hidden');toast(tr('right'))}else toast(tr('wrong'))},0)}function interact(){const o=nearest();if(!o){toast('…');return}const tag=o.userData.tag;if(tag==='filter'&&!state.filter){state.filter=true;toast(tr('got'));update();o.visible=false}else if(tag==='camera'){state.cam=true;openModal('LOG',`<p>${tr('cam')}</p><p>${tr('enter')}</p><button id="openCode" class="btn">CODE</button>`);setTimeout(()=>$('openCode').onclick=()=>codePuzzle('2413',()=>{state.p1=true;objects.find(x=>x.userData.tag==='door1').visible=false;camera.position.x=28;say(tr('m2'));update()}),0)}else if(tag==='door1'){state.p1?camera.position.x=28:toast(tr('locked'))}else if(tag==='sound'){openModal('AUDIO LOG',`<p>${tr('sound')}</p><button id="openCode" class="btn">CODE</button>`);setTimeout(()=>$('openCode').onclick=()=>codePuzzle('3113',()=>{state.p2=true;objects.find(x=>x.userData.tag==='door2').visible=false;camera.position.x=56;say(tr('m3'));update()}),0)}else if(tag==='door2'){state.p2?camera.position.x=56:toast(tr('locked'))}else if(tag.startsWith('tile')){if(!state.future){toast(tr('locked'));return}state.seq.push(tag.slice(-1));toast(state.seq.join(' → '));if(state.seq.length===3){if(state.seq.join('')==='ACB'){state.p3=true;toast(tr('right'))}else{state.seq=[];toast(tr('wrong'))}}}else if(tag==='exit'){if(state.p3){openModal('CLEAR',`<h2>${tr('clear')}</h2><p>15–30 min MVP / JP・EN・ID</p><button class="btn" onclick="location.reload()">RETRY</button>`)}else toast(tr('locked'))}}function future(){if(state.future)return;state.future=true;toast(tr('future'));update();objects.filter(o=>o.userData.tag.startsWith('tile')).forEach((o,i)=>o.material.emissive.setHex([0x00ffff,0xff2255,0x00ffff][i]));setTimeout(()=>{state.future=false;update()},12000)}function hint(){say([tr('h1'),tr('h2'),tr('h3')][state.room])}function tick(){requestAnimationFrame(tick);if(state.started&&document.pointerLockElement===renderer.domElement){const dir=new THREE.Vector3();camera.getWorldDirection(dir);dir.y=0;dir.normalize();const side=new THREE.Vector3().crossVectors(dir,new THREE.Vector3(0,1,0));const s=.12;if(keys.w||keys.arrowup)camera.position.addScaledVector(dir,s);if(keys.s||keys.arrowdown)camera.position.addScaledVector(dir,-s);if(keys.a||keys.arrowleft)camera.position.addScaledVector(side,-s);if(keys.d||keys.arrowright)camera.position.addScaledVector(side,s);camera.position.x=Math.max(-5,Math.min(62,camera.position.x));camera.position.z=Math.max(-7,Math.min(7,camera.position.z));state.room=camera.position.x<14?0:camera.position.x<42?1:2;update()}renderer.render(scene,camera)}tick();addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});setLang('ja');
</script></body></html>
