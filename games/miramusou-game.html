<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>ミラ無双 横スクロールアクション体験版</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: "Noto Sans JP", "Yu Gothic UI", system-ui, sans-serif;
      --cyan: #56dcff;
      --gold: #ffd36a;
      --pink: #ff66c7;
    }
    * { box-sizing: border-box; touch-action: none; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #060914; color: white; }
    canvas { position: fixed; inset: 0; width: 100%; height: 100%; }
    .hud {
      position: fixed;
      top: max(10px, env(safe-area-inset-top));
      left: 10px;
      right: 10px;
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 10px;
      z-index: 3;
      pointer-events: none;
    }
    .logo {
      padding: 8px 12px;
      border-radius: 10px;
      background: linear-gradient(180deg, rgba(8,12,28,.55), rgba(8,12,28,.2));
      text-shadow: 0 3px 0 #000, 0 0 18px rgba(82,224,255,.85);
      font-weight: 1000;
      font-size: clamp(18px, 3.5vw, 34px);
      letter-spacing: .02em;
    }
    .stats { display: flex; gap: 8px; flex-wrap: wrap; justify-content: end; }
    .chip {
      min-width: 78px;
      padding: 8px 10px;
      border: 2px solid rgba(255,255,255,.22);
      border-radius: 10px;
      background: rgba(3,6,18,.62);
      box-shadow: inset 0 0 18px rgba(86,220,255,.16), 0 8px 24px rgba(0,0,0,.35);
      text-align: center;
    }
    .chip small { display: block; font-size: 10px; color: #bdeeff; font-weight: 1000; }
    .chip b { display: block; font-size: 21px; color: var(--gold); line-height: 1.1; }
    .hp-mini { width: 82px; height: 7px; margin-top: 5px; border-radius: 999px; overflow: hidden; background: rgba(255,255,255,.16); box-shadow: inset 0 0 8px rgba(0,0,0,.45); }
    .hp-mini i { display: block; height: 100%; width: 100%; background: linear-gradient(90deg,#6dff9d,#ffd36a,#ff66c7); box-shadow: 0 0 12px rgba(121,255,178,.8); }
    .title {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: end center;
      padding: 24px 18px max(36px, env(safe-area-inset-bottom));
      background:
        radial-gradient(circle at 50% 50%, rgba(86,220,255,.2), transparent 52%),
        #050815 url("../images/mira-musou-title-screen.png") center / contain no-repeat;
      z-index: 5;
    }
    .title::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 0 62%, rgba(0,0,0,.42));
      pointer-events: none;
    }
    .start {
      position: relative;
      min-width: min(430px, 74vw);
      min-height: 72px;
      border: 3px solid #fff1b7;
      border-radius: 999px;
      color: #fff9da;
      background: linear-gradient(180deg, #ffe08a, #b86910 52%, #784107);
      box-shadow: 0 8px 0 #351b02, 0 0 32px rgba(255,204,90,.75), inset 0 3px 10px rgba(255,255,255,.7);
      text-shadow: 0 3px 0 #4b2500;
      font: inherit;
      font-size: clamp(26px, 6vw, 44px);
      font-weight: 1000;
      cursor: pointer;
    }
    .result-panel {
      position: relative;
      width: min(680px, calc(100vw - 28px));
      padding: 18px 18px 16px;
      margin-bottom: 14px;
      border: 2px solid rgba(255,255,255,.32);
      border-radius: 16px;
      background: rgba(2, 8, 26, .72);
      box-shadow: 0 0 32px rgba(86,220,255,.35), inset 0 0 24px rgba(255,255,255,.08);
      text-align: center;
      backdrop-filter: blur(12px);
    }
    .result-panel h2 { margin: 0 0 8px; font-size: clamp(28px, 6vw, 58px); line-height: 1; color: #fff; text-shadow: 0 0 18px rgba(86,220,255,.95), 0 4px 0 #000; }
    .result-panel p { margin: 0; color: #dff8ff; font-weight: 900; line-height: 1.55; text-shadow: 0 2px 0 #000; }
    .result-actions { position: relative; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 12px; }
    .result-actions button, .pause-card button {
      min-width: 180px; min-height: 48px; border: 2px solid rgba(255,255,255,.46); border-radius: 999px;
      color: #fff; background: rgba(4, 12, 32, .72); font: inherit; font-weight: 1000;
      box-shadow: inset 0 0 18px rgba(86,220,255,.22), 0 8px 24px rgba(0,0,0,.34);
    }
    .pause-btn {
      position: fixed; top: max(12px, env(safe-area-inset-top)); right: 12px; z-index: 6;
      width: 56px; height: 56px; border-radius: 14px; border: 2px solid rgba(255,255,255,.42);
      color: #fff; background: rgba(4, 8, 24, .55); font: inherit; font-size: 28px; font-weight: 1000;
      box-shadow: inset 0 0 18px rgba(86,220,255,.18), 0 8px 24px rgba(0,0,0,.38);
      backdrop-filter: blur(10px);
    }
    .pause-overlay {
      position: fixed; inset: 0; z-index: 7; display: grid; place-items: center;
      background: rgba(0, 0, 0, .48); backdrop-filter: blur(5px);
    }
    .pause-card {
      width: min(520px, calc(100vw - 28px)); padding: 24px; border-radius: 18px;
      border: 2px solid rgba(255,255,255,.34); background: rgba(2,8,26,.84); text-align: center;
      box-shadow: 0 0 34px rgba(86,220,255,.28), inset 0 0 28px rgba(255,255,255,.08);
    }
    .pause-card h2 { margin: 0 0 14px; font-size: clamp(34px, 8vw, 68px); text-shadow: 0 0 22px rgba(86,220,255,.9), 0 4px 0 #000; }
    .touch {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: max(12px, env(safe-area-inset-bottom));
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 12px;
      pointer-events: none;
      z-index: 4;
    }
    .pad, .actions { display: grid; gap: 8px; pointer-events: auto; }
    .pad { grid-template-columns: repeat(3, 54px); grid-template-rows: repeat(2, 54px); }
    .actions { grid-template-columns: repeat(3, 60px); }
    .pad button, .actions button {
      min-height: 54px;
      padding: 0;
      border: 2px solid rgba(255,255,255,.24);
      border-radius: 13px;
      color: #fff;
      background: rgba(4,8,24,.5);
      box-shadow: inset 0 0 18px rgba(86,220,255,.16), 0 8px 24px rgba(0,0,0,.3);
      backdrop-filter: blur(10px);
      font: inherit;
      font-weight: 1000;
    }
    .pad .up { grid-column: 2; }
    .pad .left { grid-column: 1; grid-row: 2; }
    .pad .down { grid-column: 2; grid-row: 2; }
    .pad .right { grid-column: 3; grid-row: 2; }
    .actions .wide { grid-column: span 2; color: #061018; background: linear-gradient(135deg, var(--cyan), #fff 52%, var(--pink)); }
    .hidden { display: none !important; }
    @media (max-width: 720px) {
      .hud { flex-direction: column; }
      .stats { justify-content: start; }
      .chip { min-width: 68px; padding: 7px 8px; }
      .pad { grid-template-columns: repeat(3, 48px); grid-template-rows: repeat(2, 48px); }
      .actions { grid-template-columns: repeat(3, 54px); }
      .pad button, .actions button { min-height: 48px; }
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <button class="pause-btn" id="pauseBtn" aria-label="pause">Ⅱ</button>

  <div class="hud">
    <div class="logo">ミラの未来視外伝 ミラ無双</div>
    <div class="stats">
      <div class="chip"><small>SCORE</small><b id="score">0</b></div>
      <div class="chip"><small>HP</small><b id="hp">100</b><div class="hp-mini"><i id="hpBar"></i></div></div>
      <div class="chip"><small>LEVEL</small><b id="level">1</b></div>
      <div class="chip"><small>COMBO</small><b id="combo">0</b></div>
      <div class="chip"><small>未来視</small><b id="future">0</b></div>
      <div class="chip"><small>WAVE</small><b id="wave">1</b></div>
      <div class="chip"><small>STAGE</small><b id="stage">1</b></div>
    </div>
  </div>

  <div class="title" id="title">
    <div class="result-panel hidden" id="resultPanel">
      <h2 id="resultHeading">RESULT</h2>
      <p id="resultBody"></p>
    </div>
    <button class="start" id="start">GAME START</button>
    <div class="result-actions hidden" id="resultActions">
      <button id="ngPlus">強くてニューゲーム</button>
      <button id="freshStart">最初から</button>
    </div>
  </div>
  <div class="pause-overlay hidden" id="pauseOverlay">
    <div class="pause-card">
      <h2>PAUSED</h2>
      <button id="resumeBtn">RESUME</button>
    </div>
  </div>

  <div class="touch">
    <div class="pad" aria-label="移動">
      <button class="up" data-key="jump">▲</button>
      <button class="left" data-key="left">◀</button>
      <button class="down" data-key="down">▼</button>
      <button class="right" data-key="right">▶</button>
    </div>
    <div class="actions" aria-label="攻撃">
      <button data-key="attack">斬</button>
      <button data-key="burst">連斬</button>
      <button data-key="wave">波動</button>
      <button data-key="dash">回転斬</button>
      <button data-key="rush">突進</button>
      <button data-key="ring">天輪</button>
      <button data-key="cutinSkill">ミライシ</button>
      <button data-key="heal">HP回復</button>
      <button class="wide" data-key="special">未来視奥義</button>
    </div>
  </div>
  <audio id="bgm" src="../assets/mira-musou-bgm.mp3" loop preload="auto"></audio>

  <script>
    const canvas = document.querySelector("#game");
    const ctx = canvas.getContext("2d");
    const title = document.querySelector("#title");
    const resultPanel = document.querySelector("#resultPanel");
    const resultHeading = document.querySelector("#resultHeading");
    const resultBody = document.querySelector("#resultBody");
    const resultActions = document.querySelector("#resultActions");
    const ngPlusBtn = document.querySelector("#ngPlus");
    const freshStartBtn = document.querySelector("#freshStart");
    const pauseBtn = document.querySelector("#pauseBtn");
    const pauseOverlay = document.querySelector("#pauseOverlay");
    const resumeBtn = document.querySelector("#resumeBtn");
    const scoreEl = document.querySelector("#score");
    const hpEl = document.querySelector("#hp");
    const hpBarEl = document.querySelector("#hpBar");
    const levelEl = document.querySelector("#level");
    const comboEl = document.querySelector("#combo");
    const futureEl = document.querySelector("#future");
    const waveEl = document.querySelector("#wave");
    const stageEl = document.querySelector("#stage");
    const bgm = document.querySelector("#bgm");
    const keys = new Set();
    let audioCtx = null;
    const imgs = {};
    const sources = {
      bgGate: "../images/mira-musou-stage-gate.png",
      bgWhite: "../images/mira-musou-stage-white-1f.png",
      player: "../images/mira-musou-player-sheet-clean.png",
      enemyNinja: "../images/mira-musou-enemy-ninja.png",
      enemyOni: "../images/mira-musou-enemy-oni.png",
      enemyMage: "../images/mira-musou-enemy-mage.png",
      boss: "../images/mira-musou-boss.png",
      bossWhite: "../images/mira-musou-boss-white.png",
      bossChronos: "../images/mira-musou-boss-chronos.png",
      cutinMiraisi: "../images/mira-musou-cutin-miraisi.png",
      cutinSpecial: "../images/mira-musou-cutin-special.png",
      slash: "../images/mira-musou-slash.png"
    };
    let w = 0, h = 0, dpr = 1, last = 0, running = false;
    let camera = 0, score = 0, combo = 0, comboTime = 0, spawn = 0, clearText = "", boss = null;
    let miraLevel = 1, miraExp = 0, miraNext = 24, gameOverContinue = false, paused = false;
    let enemyId = 1, wave = 1, ko = 0, shake = 0, cutin = 0, cutinText = "", cutinMode = "warning", hitStop = 0, stage = 1, upgrade = 0, nextStageReady = false;
    const stageWorld = 15000;
    const gravity = 1800;
    const player = { x: 360, y: 0, vx: 0, vy: 0, hp: 100, future: 0, face: 1, ground: true, atk: 0, inv: 0, special: 0, slow: 0 };
    const skills = {
      dash: { cd: 0, max: 2.4 },
      heal: { cd: 0, max: 60 },
      burst: { cd: 0, max: 1.6 },
      wave: { cd: 0, max: 2.2 },
      rush: { cd: 0, max: 2.8 },
      ring: { cd: 0, max: 3.8 },
      cutinSkill: { cd: 0, max: 7.8 },
      special: { cd: 0, max: 6.5 }
    };
    const enemyTypes = {
      ninja: { img: "enemyNinja", hp: 34, speed: 122, w: 104, h: 120, drawW: 178, drawH: 170, yOffset: -88, damage: 8, score: 40 },
      oni: { img: "enemyOni", hp: 76, speed: 70, w: 138, h: 150, drawW: 220, drawH: 210, yOffset: -116, damage: 15, score: 90 },
      mage: { img: "enemyMage", hp: 48, speed: 54, w: 118, h: 128, drawW: 198, drawH: 190, yOffset: -138, damage: 11, score: 70 }
    };
    let enemies = [];
    let slashes = [];
    let particles = [];
    let pickups = [];
    let floaters = [];

    function loadImages() {
      return Promise.all(Object.entries(sources).map(([key, src]) => new Promise(resolve => {
        const img = new Image();
        img.onload = () => { imgs[key] = img; resolve(); };
        img.onerror = resolve;
        img.src = src;
      })));
    }

    function resize() {
      dpr = Math.min(2, window.devicePixelRatio || 1);
      w = innerWidth; h = innerHeight;
      canvas.width = Math.floor(w * dpr);
      canvas.height = Math.floor(h * dpr);
      canvas.style.width = w + "px";
      canvas.style.height = h + "px";
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      player.y = Math.min(player.y || ground() - 112, ground() - 112);
    }
    function ground() { return h * .79; }
    function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
    function maxHp() { return 100 + (miraLevel - 1) * 7; }
    function damageScale() { return 1 + (miraLevel - 1) * .045; }
    function scaledDamage(v) { return Math.round(v * damageScale()); }
    function addExp(amount = 1) {
      miraExp += amount;
      while (miraExp >= miraNext) {
        miraExp -= miraNext;
        miraLevel += 1;
        miraNext = Math.floor(miraNext * 1.45 + 9);
        player.hp = maxHp();
        showCutin(`MIRA LEVEL UP  Lv.${miraLevel}`, "skill", 1.6);
        floatText(`LEVEL UP ${miraLevel}`, player.x, player.y - 205, "#ffd36a", 34);
        for (let i = 0; i < 36; i++) spark(player.x + rnd(-100, 100), player.y + rnd(-170, 24), i % 2 ? "#ffd36a" : "#56dcff");
      }
    }
    function rnd(a, b) { return a + Math.random() * (b - a); }
    function hit(a, b) {
      return Math.abs(a.x - b.x) * 2 < (a.w + b.w) && Math.abs(a.y - b.y) * 2 < (a.h + b.h);
    }

    function reset(full = true) {
      running = true; paused = false; pauseOverlay.classList.add("hidden"); camera = 0; combo = 0; comboTime = 0; spawn = 0; clearText = ""; boss = null; nextStageReady = false;
      enemyId = 1; wave = 1; shake = 0; cutin = 0; cutinText = ""; cutinMode = "warning"; hitStop = 0;
      if (full) { score = 0; ko = 0; stage = 1; upgrade = 0; miraLevel = 1; miraExp = 0; miraNext = 24; }
      gameOverContinue = false;
      Object.values(skills).forEach(s => { s.cd = 0; });
      Object.assign(player, { x: 360, y: ground() - 112, vx: 0, vy: 0, hp: maxHp(), future: full ? 0 : 55, face: 1, ground: true, atk: 0, inv: 0, special: 0, slow: 0 });
      enemies = []; slashes = []; particles = []; pickups = []; floaters = [];
      floatText(stageName(), player.x + 220, player.y - 190, "#fff4b8", 34);
      for (let i = 0; i < (stage >= 3 ? 18 : 12); i++) addEnemy(900 + i * (stage >= 3 ? 320 : 420), i < 4 ? "ninja" : null);
      updateHud();
    }
    function stageName() {
      return ["", "STAGE 1 城門前", "STAGE 2 白城 1F", "STAGE 3 場内最上階", "STAGE 4 天守閣 ラスボス戦"][stage] || "STAGE " + stage;
    }
    function showOverlay(heading, body, primary = "NEXT", actions = false) {
      resultHeading.textContent = heading;
      resultBody.innerHTML = body;
      resultPanel.classList.remove("hidden");
      resultActions.classList.toggle("hidden", !actions);
      document.querySelector("#start").textContent = primary;
      title.classList.remove("hidden");
    }
    function hideOverlay() {
      resultPanel.classList.add("hidden");
      resultActions.classList.add("hidden");
      title.classList.add("hidden");
    }
    function resultStats(extra = "") {
      return `SCORE ${Math.floor(score)} / KO ${ko} / Lv.${miraLevel} / HP ${Math.ceil(player.hp)}/${maxHp()}${extra}`;
    }
    function showCutin(text, mode = "warning", seconds = 2) {
      cutin = seconds;
      cutinText = text;
      cutinMode = mode;
      shake = Math.max(shake, mode === "warning" ? 14 : 18);
    }
    function pickEnemyType() {
      const r = Math.random();
      if (r < .48) return "ninja";
      if (r < .78) return "mage";
      return "oni";
    }
    function addEnemy(x, forcedType) {
      const type = forcedType || pickEnemyType();
      const spec = enemyTypes[type];
      const y = type === "mage" ? ground() - 135 : ground() - 92;
      enemies.push({ id: enemyId++, type, x, y, w: spec.w, h: spec.h, hp: spec.hp + wave * 3, maxHp: spec.hp + wave * 3, vx: -rnd(spec.speed * .45, spec.speed), stun: 0, flash: 0, attack: 0 });
    }
    function spawnBoss() {
      if (boss) return;
      const defs = {
        1: { hp: 620, w: 210, h: 260, name: "NIGHT ONI WARLORD" },
        2: { hp: 900, w: 230, h: 280, name: "WHITE CASTLE GUARDIAN" },
        3: { hp: 1180, w: 238, h: 292, name: "双影の挟撃者" },
        4: { hp: 1550, w: 280, h: 335, name: "天守閣ラスボス クロノス・ベルセルク" }
      };
      const def = defs[stage] || defs[4];
      const hp = def.hp;
      boss = { x: stageWorld - 520, y: ground() - 154, w: def.w, h: def.h, hp, maxHp: hp, flash: 0, attack: 0, cooldown: stage >= 3 ? .82 : 1.1, phase: 0, name: def.name };
      showCutin(stage === 4 ? "LAST BOSS  CHRONOS BERSERK" : (stage === 3 ? "WARNING  PINCER BOSS" : ""), "warning", 2.2);
      shake = 18;
      for (let i = 0; i < 34; i++) spark(boss.x + rnd(-160, 160), boss.y + rnd(-160, 90), i % 2 ? "#ff66c7" : "#56dcff");
    }
    function slash(power) {
      const big = power > 1;
      const boost = (upgrade ? 1.35 : 1) * damageScale();
      slashes.push({ x: player.x + player.face * (big ? 128 : 92), y: player.y - 40, w: big ? 300 : 200, h: big ? 165 : 116, face: player.face, life: big ? .3 : .18, damage: Math.round((big ? 92 : 30) * boost), big, hitIds: new Set(), bossHit: false });
      shake = Math.max(shake, big ? 16 : 5);
      for (let i = 0; i < (big ? 26 : 10); i++) spark(player.x + player.face * rnd(30, big ? 210 : 130), player.y + rnd(-95, 25), big ? "#ffd36a" : "#56dcff");
    }
    function spark(x, y, color) {
      particles.push({ x, y, vx: rnd(-260, 260), vy: rnd(-310, 100), r: rnd(2, 6), life: rnd(.28, .72), max: .72, color });
    }
    function areaDamage(cx, cy, radius, damage, color = "#56dcff") {
      enemies.forEach(e => {
        if (e.hp <= 0) return;
        const dx = e.x - cx;
        const dy = (e.y - 70) - cy;
        if (Math.hypot(dx, dy) <= radius) {
          e.hp -= scaledDamage(damage);
          e.stun = .55;
          e.flash = .18;
          e.x += Math.sign(e.x - player.x || player.face) * 72;
          score += enemyTypes[e.type].score;
          combo += 1;
          comboTime = 1.25;
          floatText(String(scaledDamage(damage)), e.x, e.y - 98, color, scaledDamage(damage) > 80 ? 30 : 23);
          if (e.hp <= 0) {
            ko += 1;
            addExp(e.type === "oni" ? 2 : 1);
            score += 220 + combo * 10;
            dropPickup(e.x, e.y - 60);
            floatText("KO", e.x, e.y - 130, "#fff", 20);
          }
        }
      });
      if (boss) {
        const dx = boss.x - cx;
        const dy = (boss.y - 100) - cy;
        if (Math.hypot(dx, dy) <= radius + 120) {
          boss.hp -= scaledDamage(damage);
          boss.flash = .22;
          boss.attack = .5;
          score += 180;
          combo += 1;
          comboTime = 1.25;
          floatText(String(scaledDamage(damage)), boss.x, boss.y - 220, color, scaledDamage(damage) > 80 ? 34 : 26);
        }
      }
      player.future = clamp(player.future + 18, 0, 100);
    }
    function ensureAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === "suspended") audioCtx.resume();
    }
    function se(type) {
      if (!audioCtx) return;
      const now = audioCtx.currentTime;
      const tone = (freq, endFreq, dur, wave = "triangle", vol = .22, delay = 0) => {
        const t0 = now + delay;
        const gain = audioCtx.createGain();
        const osc = audioCtx.createOscillator();
        gain.connect(audioCtx.destination);
        gain.gain.setValueAtTime(vol, t0);
        gain.gain.exponentialRampToValueAtTime(.001, t0 + dur);
        osc.type = wave;
        osc.frequency.setValueAtTime(freq, t0);
        osc.frequency.exponentialRampToValueAtTime(Math.max(1, endFreq), t0 + dur * .9);
        osc.connect(gain);
        osc.start(t0);
        osc.stop(t0 + dur);
      };
      const noiseHit = (dur, vol, hp, delay = 0) => {
        const t0 = now + delay;
        const length = Math.floor(audioCtx.sampleRate * dur);
        const buffer = audioCtx.createBuffer(1, length, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < length; i++) {
          const t = i / length;
          data[i] = (Math.random() * 2 - 1) * Math.pow(1 - t, 2.2);
        }
        const src = audioCtx.createBufferSource();
        const filter = audioCtx.createBiquadFilter();
        const gain = audioCtx.createGain();
        src.buffer = buffer;

      ctx.scale(player.face, 1);
      if (player.inv > 0 && Math.floor(performance.now() / 70) % 2) ctx.globalAlpha = .55;
      ctx.rotate(tilt * player.face);
      ctx.shadowColor = "rgba(86,220,255,.9)";
      ctx.shadowBlur = 24;
      const img = imgs.player;
      const rawFw = img ? img.width / 6 : 0;
      const sx0 = img ? Math.round(frame * rawFw) : 0;
      const sx1 = img ? Math.round((frame + 1) * rawFw) : 0;
      const fw = Math.max(1, sx1 - sx0);
      const fh = img ? img.height : 0;
      if (img && player.atk > 0) {
        ctx.save();
        ctx.globalCompositeOperation = "screen";
        ctx.globalAlpha = .35;
        ctx.fillStyle = "rgba(86,220,255,.42)";
        ctx.beginPath();
        ctx.ellipse(22, -62, 96, 128, -.18, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
      if (img) {
        const frontTrim = 0;
        const srcW = Math.max(1, fw - frontTrim);
        const dstW = 208 * (srcW / fw);
        ctx.drawImage(img, sx0, 0, srcW, fh, -104, -178, dstW, 274);
      }
      ctx.save();
      ctx.globalCompositeOperation = "screen";
      ctx.strokeStyle = "rgba(255,255,210,.72)";
      ctx.lineWidth = 5;
      ctx.beginPath();
      ctx.ellipse(0, -168 + Math.sin(t * 5) * 4, 46, 10, 0, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
      ctx.restore();
    }
    function drawEnemy(e) {
      const x = sx(e.x);
      if (x < -220 || x > w + 220) return;
      const spec = enemyTypes[e.type];
      const t = performance.now() / 1000 + e.x * .01;
      const run = Math.sin(t * 11) * 6;
      let frame = Math.floor(t * 8) % 2;
      if (e.flash > 0) frame = 3;
      else if (e.attack > 0 || Math.abs(player.x - e.x) < 160) frame = 2;
      ctx.save();
      ctx.translate(x, e.y + run);
      ctx.scale(player.x < e.x ? -1 : 1, 1);
      ctx.rotate(Math.sin(t * 9) * .06);
      ctx.shadowColor = e.flash > 0 ? "#fff" : "rgba(255,102,199,.8)";
      ctx.shadowBlur = e.flash > 0 ? 28 : 16;
      const img = imgs[spec.img];
      const fw = img ? img.width / 4 : 0;
      const fh = img ? img.height : 0;
      if (img) {
        ctx.save();
        ctx.globalAlpha = .18;
        ctx.translate(-20, 0);
        ctx.drawImage(img, frame * fw, 0, fw, fh, -spec.drawW / 2, spec.yOffset, spec.drawW, spec.drawH);
        ctx.restore();
      }
      if (img) ctx.drawImage(img, frame * fw, 0, fw, fh, -spec.drawW / 2, spec.yOffset, spec.drawW, spec.drawH);
      if (e.hp < e.maxHp) {
        ctx.fillStyle = "rgba(0,0,0,.5)";
        ctx.fillRect(-42, spec.yOffset - 14, 84, 6);
        ctx.fillStyle = "#ff66c7";
        ctx.fillRect(-42, spec.yOffset - 14, 84 * clamp(e.hp / e.maxHp, 0, 1), 6);
      }
      ctx.restore();
    }
    function drawBoss() {
      const x = sx(boss.x);
      if (x < -420 || x > w + 420) return;
      const t = performance.now() / 1000;
      let frame = 0;
      if (boss.flash > 0) frame = 2;
      else if (boss.attack > 0) frame = 1;
      ctx.save();
      ctx.translate(x, boss.y + Math.sin(t * 3) * 5);
      ctx.scale(player.x < boss.x ? -1 : 1, 1);
      ctx.shadowColor = boss.flash > 0 ? "#fff" : "rgba(255,70,180,.95)";
      ctx.shadowBlur = boss.flash > 0 ? 46 : 28;
      const img = stage === 1 ? imgs.boss : (stage === 4 ? imgs.bossChronos : imgs.bossWhite);
      const fw = img ? img.width / 3 : 0;
      const fh = img ? img.height : 0;
      if (img && stage === 4) ctx.drawImage(img, -225, -330, 450, 470);
      else if (img) ctx.drawImage(img, frame * fw, 0, fw, fh, stage === 1 ? -170 : -190, stage === 1 ? -255 : -285, stage === 1 ? 340 : 380, stage === 1 ? 330 : 370);
      ctx.restore();

      ctx.save();
      ctx.fillStyle = "rgba(0,0,0,.58)";
      ctx.fillRect(24, 74, w - 48, 18);
      ctx.fillStyle = "rgba(255,255,255,.35)";
      ctx.fillRect(27, 77, w - 54, 12);
      ctx.fillStyle = "linear-gradient";
      const grad = ctx.createLinearGradient(27, 0, w - 27, 0);
      grad.addColorStop(0, "#ff66c7");
      grad.addColorStop(1, "#ffd36a");
      ctx.fillStyle = grad;
      ctx.fillRect(27, 77, (w - 54) * clamp(boss.hp / boss.maxHp, 0, 1), 12);
      ctx.fillStyle = "#fff";
      ctx.font = "900 13px system-ui, sans-serif";
      ctx.fillText("BOSS  " + boss.name, 28, 68);
      ctx.restore();
    }
    function drawSlash(s) {
      ctx.save();
      ctx.translate(sx(s.x), s.y);
      const a = clamp(s.life / (s.maxLife || .5), 0, 1);
      ctx.globalAlpha = a;
      if (s.kind === "spin") {
        const t = performance.now() / 1000;
        ctx.globalCompositeOperation = "screen";
        ctx.shadowColor = "#bff8ff";
        ctx.shadowBlur = 36;
        for (let i = 0; i < 4; i++) {
          const r = 70 + i * 34;
          ctx.strokeStyle = i % 2 ? "rgba(255,255,255,.7)" : "rgba(86,220,255,.78)";
          ctx.lineWidth = 8 - i;
          ctx.beginPath();
          ctx.arc(0, 0, r, t * 8 + i, t * 8 + i + Math.PI * 1.25);
          ctx.stroke();
        }
        for (let i = 0; i < 5; i++) {
          const ang = t * 9 + i * Math.PI * 2 / 5;
          ctx.save();
          ctx.rotate(ang);
          ctx.strokeStyle = "rgba(255,255,255,.86)";
          ctx.lineWidth = 9;
          ctx.beginPath();
          ctx.moveTo(24, -18);
          ctx.quadraticCurveTo(122, -74, 178, -8);
          ctx.stroke();
          ctx.restore();
        }
        ctx.restore();
        return;
      }
      if (s.kind === "ringBlade") {
        ctx.rotate((s.angle || 0) + Math.PI / 2);
        ctx.globalCompositeOperation = "screen";
        ctx.shadowColor = "#ffd36a";
        ctx.shadowBlur = 32;
        ctx.fillStyle = "rgba(255,244,184,.92)";
        ctx.beginPath();
        ctx.moveTo(0, -94);
        ctx.lineTo(20, -8);
        ctx.lineTo(0, 100);
        ctx.lineTo(-20, -8);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = "rgba(86,220,255,.85)";
        ctx.lineWidth = 5;
        ctx.stroke();
        ctx.restore();
        return;
      }
      ctx.scale(s.face, 1);
      const pulse = 1 + Math.sin(performance.now() / 35) * .08;
      ctx.scale(pulse, pulse);
      ctx.globalAlpha = clamp(s.life * 7, 0, 1);
      ctx.shadowColor = s.big ? "#ffd36a" : "#56dcff";
      ctx.shadowBlur = 34;
      const img = imgs.slash;
      if (img) ctx.drawImage(img, -s.w * .52, -s.h * .55, s.w, s.h);
      ctx.globalCompositeOperation = "screen";
      ctx.strokeStyle = s.big ? "rgba(255,211,106,.65)" : "rgba(86,220,255,.72)";
      ctx.lineWidth = s.big ? 10 : 6;
      ctx.beginPath();
      ctx.moveTo(-s.w * .45, s.h * .2);
      ctx.quadraticCurveTo(0, -s.h * .5, s.w * .48, -s.h * .16);
      ctx.stroke();
      ctx.restore();
    }
    function drawParticle(p) {
      ctx.save();
      ctx.globalAlpha = clamp(p.life / p.max, 0, 1);
      ctx.fillStyle = p.color;
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 16;
      ctx.beginPath(); ctx.arc(sx(p.x), p.y, p.r, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    }
    function drawPickup(p) {
      const x = sx(p.x);
      const y = p.y + Math.sin(performance.now() / 180 + p.bob) * 8;
      ctx.save();
      ctx.translate(x, y);
      ctx.globalCompositeOperation = "screen";
      ctx.shadowColor = p.kind === "heal" ? "#79ffb2" : "#56dcff";
      ctx.shadowBlur = 22;
      ctx.fillStyle = p.kind === "heal" ? "rgba(121,255,178,.9)" : "rgba(86,220,255,.9)";
      ctx.beginPath();
      ctx.arc(0, 0, 16, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = "rgba(255,255,255,.85)";
      ctx.lineWidth = 3;
      ctx.beginPath();
      if (p.kind === "heal") {
        ctx.moveTo(-8, 0); ctx.lineTo(8, 0); ctx.moveTo(0, -8); ctx.lineTo(0, 8);
      } else {
        ctx.moveTo(-8, 6); ctx.lineTo(0, -9); ctx.lineTo(8, 6);
      }
      ctx.stroke();
      ctx.restore();
    }
    function drawFloater(f) {
      ctx.save();
      ctx.globalAlpha = clamp(f.life / f.max, 0, 1);
      ctx.fillStyle = f.color;
      ctx.strokeStyle = "rgba(0,0,0,.72)";
      ctx.lineWidth = 5;
      ctx.font = `1000 ${f.size}px system-ui, sans-serif`;
      ctx.textAlign = "center";
      ctx.strokeText(f.text, sx(f.x), f.y);
      ctx.fillText(f.text, sx(f.x), f.y);
      ctx.restore();
    }
    function drawProgress() {
      ctx.save();
      ctx.fillStyle = "rgba(255,255,255,.2)";
      ctx.fillRect(18, h - 14, w - 36, 5);
      ctx.fillStyle = "#56dcff";
      ctx.fillRect(18, h - 14, (w - 36) * clamp(player.x / stageWorld, 0, 1), 5);
      ctx.fillStyle = "#fff";
      ctx.font = "900 12px system-ui, sans-serif";
      ctx.textAlign = "left";
      const remain = Math.max(0, Math.floor((stageWorld - player.x) / 100));
      ctx.fillText(boss ? "目標: ボスを倒せ！" : `目標: 右へ進め / ボス地点まで ${remain}m`, 18, h - 56);
      ctx.fillStyle = upgrade ? "#ffd36a" : "#b8c6d8";
      ctx.fillText(upgrade ? "強化: 未来視覚醒 攻撃UP / 技回転UP" : "強化: Stage 1クリアで覚醒", 18, h - 36);
      ctx.restore();
    }
    function drawSkillHud() {
      const labels = [
        ["連斬", skills.burst],
        ["波動", skills.wave],
        ["回転", skills.dash],
        ["回復", skills.heal],
        ["突進", skills.rush],
        ["天輪", skills.ring],
        ["ミライシ", skills.cutinSkill],
        ["奥義", skills.special]
      ];
      const boxW = Math.min(86, (w - 34) / labels.length - 4);
      const y = h - 48;
      ctx.save();
      ctx.font = "900 11px system-ui, sans-serif";
      ctx.textAlign = "center";
      labels.forEach(([label, skill], i) => {
        const x = 17 + i * (boxW + 4);
        const ready = skill.cd <= 0;
        ctx.fillStyle = ready ? "rgba(86,220,255,.28)" : "rgba(0,0,0,.46)";
        ctx.fillRect(x, y, boxW, 24);
        ctx.strokeStyle = ready ? "rgba(255,255,255,.8)" : "rgba(255,255,255,.25)";
        ctx.strokeRect(x, y, boxW, 24);
        ctx.fillStyle = ready ? "#fff" : "#b8c6d8";
        ctx.fillText(ready ? label : Math.ceil(skill.cd * 10) / 10, x + boxW / 2, y + 16);
        if (!ready) {
          ctx.fillStyle = "rgba(255,102,199,.45)";
          ctx.fillRect(x, y + 20, boxW * clamp(1 - skill.cd / skill.max, 0, 1), 4);
        }
      });
      ctx.restore();
    }
    function drawTimeVision() {
      if (player.slow <= 0) return;
      ctx.save();
      ctx.globalCompositeOperation = "screen";
      ctx.fillStyle = `rgba(86,220,255,${clamp(player.slow / 2, 0, .18)})`;
      ctx.fillRect(0, 0, w, h);
      ctx.strokeStyle = "rgba(255,255,255,.22)";
      ctx.lineWidth = 2;
      for (let i = 0; i < 7; i++) {
        ctx.beginPath();
        ctx.arc(w / 2, h / 2, 80 + i * 74 + Math.sin(performance.now() / 180) * 8, 0, Math.PI * 2);
        ctx.stroke();
      }
      ctx.restore();
    }
    function drawCutin() {
      if (cutin <= 0) return;
      const warning = cutinText || ({1:"WARNING  NIGHT ONI WARLORD",2:"WARNING  WHITE CASTLE GUARDIAN",3:"WARNING  PINCER SHADOWS",4:"LAST BOSS  CHRONOS BERSERK"}[stage] || "WARNING");
      const a = clamp(cutin / 2, 0, 1);
      ctx.save();
      if (cutinMode !== "warning") {
        const img = cutinMode === "special" ? imgs.cutinSpecial : imgs.cutinMiraisi;
        ctx.fillStyle = "rgba(0,0,0,.45)";
        ctx.fillRect(0, 0, w, h);
        if (img) {
          const targetH = Math.min(h * .64, w * 9 / 16);
          const targetW = targetH * 16 / 9;
          const x = (w - targetW) / 2;
          const y = h * .18 + Math.sin(performance.now() / 60) * 3;
          ctx.globalAlpha = .92;
          ctx.drawImage(img, x, y, targetW, targetH);
          ctx.globalCompositeOperation = "screen";
          ctx.globalAlpha = cutinMode === "special" ? .42 : .34;
          ctx.fillStyle = cutinMode === "special" ? "rgba(255,211,106,.8)" : "rgba(86,230,255,.75)";
          ctx.fillRect(0, y + targetH * .44, w, cutinMode === "special" ? 18 : 10);
        }
        ctx.globalCompositeOperation = "source-over";
      } else {
        ctx.globalAlpha = Math.min(.9, a + .15);
        ctx.fillStyle = "rgba(20,0,24,.72)";
        ctx.fillRect(0, h * .34, w, h * .22);
        ctx.globalCompositeOperation = "screen";
        ctx.fillStyle = "rgba(255,102,199,.28)";
        ctx.fillRect(0, h * .34, w, 4);
        ctx.fillStyle = "rgba(86,220,255,.28)";
        ctx.fillRect(0, h * .56 - 4, w, 4);
        ctx.globalCompositeOperation = "source-over";
      }
      ctx.fillStyle = "#fff";
      ctx.strokeStyle = cutinMode === "special" ? "#4b2100" : "#001a2d";
      ctx.lineWidth = 9;
      ctx.font = `1000 ${Math.min(58, w / 10.5)}px system-ui, sans-serif`;
      ctx.textAlign = "center";
      ctx.strokeText(warning, w / 2, h * (cutinMode === "warning" ? .48 : .72));
      ctx.fillText(warning, w / 2, h * (cutinMode === "warning" ? .48 : .72));
      ctx.restore();
    }
    function step(t) {
      const dt = Math.min(.033, (t - last) / 1000 || 0);
      last = t; update(dt); draw(); requestAnimationFrame(step);
    }
    addEventListener("resize", resize);
    addEventListener("keydown", e => keys.add(e.key));
    addEventListener("keyup", e => keys.delete(e.key));
    document.querySelectorAll("[data-key]").forEach(btn => {
      const key = btn.dataset.key;
      btn.addEventListener("pointerdown", e => { e.preventDefault(); keys.add(key); });
      btn.addEventListener("pointerup", () => keys.delete(key));
      btn.addEventListener("pointercancel", () => keys.delete(key));
      btn.addEventListener("pointerleave", () => keys.delete(key));
    });
    document.querySelector("#start").addEventListener("click", async () => {
      ensureAudio();
      bgm.volume = .46;
      try { await bgm.play(); } catch {}
      hideOverlay();
      if (nextStageReady) {
        stage = Math.min(4, stage + 1);
        reset(false);
      } else if (gameOverContinue) {
        score = 0;
        ko = 0;
        reset(false);
      } else if (clearText === "MISSION CLEAR") {
        stage = 1;
        upgrade += 1;
        reset(false);
      } else {
        reset(true);
      }
    });
    ngPlusBtn.addEventListener("click", async () => {
      ensureAudio();
      try { await bgm.play(); } catch {}
      hideOverlay();
      clearText = "";
      nextStageReady = false;
      gameOverContinue = false;
      stage = 1;
      upgrade += 1;
      reset(false);
    });
    freshStartBtn.addEventListener("click", async () => {
      ensureAudio();
      try { await bgm.play(); } catch {}
      hideOverlay();
      clearText = "";
      nextStageReady = false;
      gameOverContinue = false;
      reset(true);
    });
    pauseBtn.addEventListener("click", () => togglePause());
    resumeBtn.addEventListener("click", () => togglePause(false));
    addEventListener("keydown", e => {
      if (e.key === "Escape") togglePause();
    });
    resize();
    loadImages().then(() => requestAnimationFrame(step));
  </script>
</body>
</html>
