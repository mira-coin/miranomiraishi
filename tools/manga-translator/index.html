<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#080a10"><title>Mira Manga Translator β</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.1.1/dist/tesseract.min.js" defer></script>
<style>
:root{color-scheme:dark;--bg:#070910;--p:#111522;--l:#ffffff20;--t:#f7f8ff;--m:#a9b0c3;--a:#72dcff;--b:#ad96ff;--c:#ff8bc9;font-family:Inter,"Noto Sans JP",system-ui,sans-serif}*{box-sizing:border-box}body{margin:0;background:radial-gradient(70% 50% at 5% 0,#72dcff18,transparent),radial-gradient(60% 50% at 100% 0,#ff8bc918,transparent),var(--bg);color:var(--t)}button,input,textarea,select{font:inherit}button,a{color:inherit}.head{position:sticky;top:0;z-index:5;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 16px;border-bottom:1px solid var(--l);background:#080a10dc;backdrop-filter:blur(16px)}.brand{display:flex;align-items:center;gap:10px;text-decoration:none}.logo{display:grid;place-items:center;width:42px;height:42px;border-radius:13px;background:linear-gradient(135deg,var(--a),var(--b),var(--c));color:#080a10;font-weight:900}.brand b{display:block}.brand small{display:block;color:var(--m);font-size:11px}.actions{display:flex;gap:8px;flex-wrap:wrap}.btn{min-height:40px;padding:0 14px;border:1px solid var(--l);border-radius:999px;background:#ffffff0b;cursor:pointer;font-weight:700;font-size:13px}.btn.main{border:0;color:#070910;background:linear-gradient(120deg,var(--a),var(--b),var(--c))}.grid{display:grid;grid-template-columns:230px minmax(350px,1fr) 330px;min-height:calc(100vh - 67px)}aside{padding:15px;background:#0c0f19c9;overflow:auto}.left{border-right:1px solid var(--l)}.right{border-left:1px solid var(--l)}h2{font-size:16px;margin:0 0 10px}.note{color:var(--m);font-size:12px;line-height:1.65}.upload{display:grid;place-items:center;min-height:105px;border:1px dashed #72dcff66;border-radius:16px;background:#72dcff0c;cursor:pointer;font-weight:800;text-align:center}.upload small{display:block;color:var(--m);font-weight:500;margin-top:5px}.pages,.regions{display:grid;gap:8px;margin-top:12px}.page,.region{padding:9px;border:1px solid var(--l);border-radius:12px;background:#ffffff08;cursor:pointer}.page.on,.region.on{border-color:#ad96ffaa;background:#ad96ff18}.page{display:grid;grid-template-columns:48px 1fr auto;align-items:center;gap:8px}.page img{width:48px;height:64px;object-fit:cover;border-radius:6px}.page b,.region b{font-size:12px}.page span,.region span{display:block;color:var(--m);font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.x{width:30px;height:30px;border:1px solid var(--l);border-radius:9px;background:transparent;cursor:pointer}.work{min-width:0;display:grid;grid-template-rows:auto 1fr}.bar{display:flex;gap:7px;align-items:center;flex-wrap:wrap;padding:10px;border-bottom:1px solid var(--l)}.tool{min-height:37px;padding:0 11px;border:1px solid var(--l);border-radius:10px;background:#ffffff0a;cursor:pointer;font-weight:700;font-size:12px}.tool.on{border-color:#72dcff99;background:#72dcff18}.status{margin-left:auto;color:var(--m);font-size:12px}.wrap{min-height:480px;padding:18px;overflow:auto;display:grid;place-items:start center}.empty{align-self:center;padding:40px 20px;border:1px dashed var(--l);border-radius:20px;color:var(--m);text-align:center}.shell{background:#fff;box-shadow:0 30px 80px #0009}canvas{display:block;max-width:min(100%,850px);height:auto;touch-action:none;cursor:crosshair}.field{display:grid;gap:6px;margin:0 0 12px}.field label{font-size:12px;font-weight:800}.field textarea,.field input,.field select{width:100%;padding:10px;border:1px solid var(--l);border-radius:11px;background:#ffffff0b;color:var(--t);outline:none}.field textarea{min-height:82px;resize:vertical}.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}.modal{position:fixed;inset:0;z-index:20;display:none;place-items:center;padding:16px;background:#000b}.modal.on{display:grid}.box{width:min(700px,100%);padding:20px;border:1px solid var(--l);border-radius:20px;background:#111522}.box textarea{width:100%;min-height:330px;padding:12px;border:1px solid var(--l);border-radius:12px;background:#080a10;color:var(--t);font-family:monospace}.boxfoot{display:flex;justify-content:flex-end;gap:8px;margin-top:10px}@media(max-width:850px){.grid{display:block}.left,.right{border:0;border-bottom:1px solid var(--l)}.head{position:relative;align-items:flex-start}.brand small{display:none}.wrap{padding:8px}.pages{grid-template-columns:repeat(auto-fill,minmax(145px,1fr))}}@media(max-width:520px){.head{display:block}.actions{margin-top:10px}.row{grid-template-columns:1fr}}
</style></head>
<body>
<header class="head"><a class="brand" href="../../index.html"><span class="logo">MT</span><span><b>Mira Manga Translator β</b><small>漫画の文字抽出・翻訳編集・画像書き出し</small></span></a><div class="actions"><button class="btn" id="prompt">翻訳プロンプト</button><button class="btn" id="import">翻訳JSON取込</button><button class="btn main" id="export">画像を書き出す</button><a class="btn" href="../../index.html">公式ホーム</a></div></header>
<div class="grid">
<aside class="left"><h2>1. 漫画を追加</h2><p class="note">複数ページ対応。画像は端末内で処理します。</p><label class="upload">＋ 画像を選択<small>PNG / JPG / WEBP</small><input id="files" type="file" accept="image/*" multiple hidden></label><div class="pages" id="pages"></div></aside>
<main class="work"><div class="bar"><button class="tool on" id="add">＋ 吹き出し範囲</button><button class="tool" id="sel">選択・移動</button><button class="tool" id="ocr">選択範囲OCR</button><span class="status" id="status">画像を追加してください</span></div><div class="wrap"><div class="empty" id="empty"><b>漫画画像を追加してください</b><br>吹き出しをドラッグで囲み、翻訳文を入れて書き出します。</div><div class="shell" id="shell" hidden><canvas id="cv"></canvas></div></div></main>
<aside class="right"><h2>2. 翻訳を編集</h2><div class="field"><label>翻訳先</label><select id="lang"><option value="en">English</option><option value="id">Bahasa Indonesia</option><option value="zh">中文</option><option value="ko">한국어</option><option value="es">Español</option></select></div><div class="regions" id="regions"></div><div id="editor" hidden><div class="field"><label>日本語・原文</label><textarea id="src"></textarea></div><div class="field"><label>翻訳文</label><textarea id="dst"></textarea></div><div class="row"><div class="field"><label>文字サイズ</label><input id="size" type="number" min="10" max="180" value="42"></div><div class="field"><label>文字色</label><input id="color" type="color" value="#111111"></div></div><div class="row"><button class="btn" id="oneocr">この範囲をOCR</button><button class="btn" id="del">範囲を削除</button></div></div><p class="note">「翻訳プロンプト」をAIに貼り、返ったJSONを取り込むと全セリフを一括反映できます。</p></aside>
</div>
<div class="modal" id="modal"><div class="box"><h2 id="mtitle"></h2><p class="note" id="mhint"></p><textarea id="mtext"></textarea><div class="boxfoot"><button class="btn" id="close">閉じる</button><button class="btn main" id="maction">コピー</button></div></div></div>
<script>
(()=>{const q=s=>document.querySelector(s),cv=q('#cv'),cx=cv.getContext('2d'),S={pages:[],pi:-1,ri:-1,mode:'add',drag:null,worker:null};const E={pages:q('#pages'),regions:q('#regions'),editor:q('#editor'),empty:q('#empty'),shell:q('#shell'),status:q('#status'),src:q('#src'),dst:q('#dst'),size:q('#size'),color:q('#color'),lang:q('#lang'),modal:q('#modal'),mtext:q('#mtext'),mtitle:q('#mtitle'),mhint:q('#mhint')};const P=()=>S.pages[S.pi],R=()=>P()?.regions[S.ri],esc=s=>(s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
function img(src){return new Promise((ok,no)=>{const i=new Image;i.onload=()=>ok(i);i.onerror=no;i.src=src})}q('#files').onchange=async e=>{for(const f of e.target.files){const url=URL.createObjectURL(f),im=await img(url);S.pages.push({name:f.name,url,im,w:im.naturalWidth,h:im.naturalHeight,regions:[]})}if(S.pi<0)S.pi=0;draw();e.target.value=''};
function draw(){pages();canvas();regions()}function pages(){E.pages.innerHTML=S.pages.map((p,i)=>`<div class="page ${i===S.pi?'on':''}" data-p="${i}"><img src="${p.url}"><div><b>${i+1}ページ</b><span>${esc(p.name)}・${p.regions.length}枠</span></div><button class="x" data-x="${i}">×</button></div>`).join('');E.pages.querySelectorAll('[data-p]').forEach(x=>x.onclick=e=>{if(e.target.dataset.x)return;S.pi=+x.dataset.p;S.ri=-1;draw()});E.pages.querySelectorAll('[data-x]').forEach(x=>x.onclick=e=>{e.stopPropagation();S.pages.splice(+x.dataset.x,1);S.pi=Math.min(S.pi,S.pages.length-1);S.ri=-1;draw()})}
function canvas(){const p=P();if(!p){E.empty.hidden=false;E.shell.hidden=true;E.status.textContent='画像を追加してください';return}E.empty.hidden=true;E.shell.hidden=false;cv.width=p.w;cv.height=p.h;cx.drawImage(p.im,0,0);p.regions.forEach((r,i)=>{if(r.dst)text(r,cx);cx.save();cx.strokeStyle=i===S.ri?'#ff5eb9':'#4ed8ff';cx.lineWidth=Math.max(3,p.w/600);cx.setLineDash(i===S.ri?[]:[12,8]);cx.strokeRect(r.x,r.y,r.w,r.h);cx.restore()});E.status.textContent=`${S.pi+1}/${S.pages.length}ページ・${p.regions.length}枠`}
function text(r,c){c.save();c.fillStyle='#fff';c.fillRect(r.x,r.y,r.w,r.h);let s=+r.size||42,lines=[];const max=r.w-24;while(s>10){c.font=`700 ${s}px "Noto Sans JP",sans-serif`;lines=wrap(c,r.dst,max);if(lines.length*s*1.25<r.h-20)break;s-=2}c.fillStyle=r.color||'#111';c.textAlign='center';c.textBaseline='top';let y=r.y+(r.h-lines.length*s*1.25)/2;for(const l of lines){c.fillText(l,r.x+r.w/2,y);y+=s*1.25}c.restore()}function wrap(c,t,w){const out=[];for(const para of(t||'').split('\n')){const sp=/\s/.test(para),a=sp?para.split(/\s+/):[...para];let l='';for(const x of a){const n=l?(sp?l+' '+x:l+x):x;if(c.measureText(n).width<=w||!l)l=n;else{out.push(l);l=x}}if(l)out.push(l)}return out}
function regions(){const a=P()?.regions||[];E.regions.innerHTML=a.map((r,i)=>`<div class="region ${i===S.ri?'on':''}" data-r="${i}"><b>吹き出し ${i+1}</b><span>${esc(r.dst||r.src||'未入力')}</span></div>`).join('');E.regions.querySelectorAll('[data-r]').forEach(x=>x.onclick=()=>{S.ri=+x.dataset.r;draw()});const r=R();E.editor.hidden=!r;if(r){E.src.value=r.src||'';E.dst.value=r.dst||'';E.size.value=r.size||42;E.color.value=r.color||'#111111'}}
function pt(e){const b=cv.getBoundingClientRect(),t=e.touches?.[0]||e.changedTouches?.[0]||e;return{x:(t.clientX-b.left)*cv.width/b.width,y:(t.clientY-b.top)*cv.height/b.height}}function hit(p){const a=P()?.regions||[];for(let i=a.length-1;i>=0;i--){const r=a[i];if(p.x>=r.x&&p.x<=r.x+r.w&&p.y>=r.y&&p.y<=r.y+r.h)return i}return-1}function start(e){if(!P())return;e.preventDefault();const p=pt(e);if(S.mode==='add')S.drag={a:p};else{const i=hit(p);if(i>=0){S.ri=i;S.drag={a:p,o:{...R()},move:1};draw()}}}function move(e){if(!S.drag)return;e.preventDefault();const p=pt(e);if(S.drag.move){const r=R();r.x=Math.max(0,Math.min(cv.width-r.w,S.drag.o.x+p.x-S.drag.a.x));r.y=Math.max(0,Math.min(cv.height-r.h,S.drag.o.y+p.y-S.drag.a.y));canvas()}else{canvas();const x=Math.min(p.x,S.drag.a.x),y=Math.min(p.y,S.drag.a.y),w=Math.abs(p.x-S.drag.a.x),h=Math.abs(p.y-S.drag.a.y);cx.strokeStyle='#ff5eb9';cx.lineWidth=4;cx.strokeRect(x,y,w,h)}}function end(e){if(!S.drag)return;e.preventDefault();if(!S.drag.move){const p=pt(e),x=Math.min(p.x,S.drag.a.x),y=Math.min(p.y,S.drag.a.y),w=Math.abs(p.x-S.drag.a.x),h=Math.abs(p.y-S.drag.a.y);if(w>20&&h>20){P().regions.push({x,y,w,h,src:'',dst:'',size:Math.min(48,Math.round(h/3)),color:'#111111'});S.ri=P().regions.length-1}}S.drag=null;draw()}cv.onmousedown=start;cv.onmousemove=move;onmouseup=end;cv.ontouchstart=start;cv.ontouchmove=move;cv.ontouchend=end;
function bind(el,k,num=0){el.oninput=()=>{if(!R())return;R()[k]=num?+el.value:el.value;canvas();regions()}}bind(E.src,'src');bind(E.dst,'dst');bind(E.size,'size',1);bind(E.color,'color');q('#del').onclick=()=>{if(!R())return;P().regions.splice(S.ri,1);S.ri=-1;draw()};q('#add').onclick=()=>mode('add');q('#sel').onclick=()=>mode('sel');function mode(m){S.mode=m;q('#add').classList.toggle('on',m==='add');q('#sel').classList.toggle('on',m==='sel');cv.style.cursor=m==='add'?'crosshair':'move'}
async function worker(){if(S.worker)return S.worker;if(!window.Tesseract)throw Error('OCRライブラリを読み込めません');E.status.textContent='OCR準備中…';S.worker=await Tesseract.createWorker('jpn',1,{logger:m=>{if(m.progress)E.status.textContent=`OCR ${Math.round(m.progress*100)}%`}});return S.worker}async function ocr(){const r=R(),p=P();if(!r)return;const c=document.createElement('canvas');c.width=r.w;c.height=r.h;c.getContext('2d').drawImage(p.im,r.x,r.y,r.w,r.h,0,0,r.w,r.h);const w=await worker(),z=await w.recognize(c);r.src=(z.data.text||'').replace(/\s*\n\s*/g,' ').trim();draw()}q('#ocr').onclick=q('#oneocr').onclick=()=>ocr().catch(e=>E.status.textContent=e.message);
const names={en:'English',id:'Bahasa Indonesia',zh:'Chinese',ko:'Korean',es:'Spanish'};q('#prompt').onclick=()=>{const a=[];S.pages.forEach((p,pi)=>p.regions.forEach((r,ri)=>a.push({id:`p${pi+1}-r${ri+1}`,text:r.src||''})));open('翻訳プロンプト','AIに貼り付け、返ったJSONを取り込んでください。',`次の日本語漫画セリフを${names[E.lang.value]}へ自然に翻訳してください。短く読みやすく、説明なしでJSONだけ返してください。\n{\n "translations":[{"id":"p1-r1","text":"..."}]\n}\n入力:\n${JSON.stringify(a,null,2)}`,'copy')};q('#import').onclick=()=>open('翻訳JSON取込','AIが返したJSONを貼ってください。','{"translations":[{"id":"p1-r1","text":"Translation"}]}','import');function open(t,h,v,a){E.mtitle.textContent=t;E.mhint.textContent=h;E.mtext.value=v;E.modal.dataset.a=a;E.modal.classList.add('on')}q('#close').onclick=()=>E.modal.classList.remove('on');q('#maction').onclick=async()=>{if(E.modal.dataset.a==='copy'){await navigator.clipboard.writeText(E.mtext.value);q('#maction').textContent='コピー済み';setTimeout(()=>q('#maction').textContent='コピー',1000)}else try{const d=JSON.parse(E.mtext.value),m=new Map((d.translations||[]).map(x=>[x.id,x.text]));S.pages.forEach((p,pi)=>p.regions.forEach((r,ri)=>{const v=m.get(`p${pi+1}-r${ri+1}`);if(typeof v==='string')r.dst=v}));E.modal.classList.remove('on');draw()}catch{alert('JSON形式を確認してください')}};
q('#export').onclick=async()=>{for(let i=0;i<S.pages.length;i++){const p=S.pages[i],c=document.createElement('canvas');c.width=p.w;c.height=p.h;const x=c.getContext('2d');x.drawImage(p.im,0,0);p.regions.forEach(r=>{if(r.dst)text(r,x)});await new Promise(ok=>c.toBlob(b=>{const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`page-${String(i+1).padStart(3,'0')}-${E.lang.value}.png`;a.click();setTimeout(ok,250)},'image/png'))}};draw()})();
</script></body></html>
